<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Togal Takeoff Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a2744;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    width: 100%;
    max-width: 640px;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #1F3864 0%, #2e6db4 100%);
    padding: 28px 32px 22px;
    color: #fff;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
  .header p  { font-size: 13px; margin-top: 5px; opacity: 0.82; }

  .body { padding: 28px 32px 32px; }

  /* Drop zone */
  #drop-zone {
    border: 2.5px dashed #a0b4d6;
    border-radius: 10px;
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f4f7fc;
    position: relative;
  }
  #drop-zone.drag-over {
    border-color: #2e6db4;
    background: #e8f0fb;
    transform: scale(1.01);
  }
  #drop-zone .icon { font-size: 48px; line-height: 1; margin-bottom: 12px; }
  #drop-zone .label {
    font-size: 15px; font-weight: 600; color: #1F3864; margin-bottom: 6px;
  }
  #drop-zone .sub {
    font-size: 12px; color: #7a8eaa;
  }
  #drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* File picked indicator */
  #file-info {
    display: none;
    margin-top: 14px;
    background: #eaf3ff;
    border: 1px solid #b3d0f5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #1a3a6b;
    align-items: center;
    gap: 10px;
  }
  #file-info .fname { font-weight: 600; flex: 1; word-break: break-all; }
  #file-info .clear-btn {
    background: none; border: none; cursor: pointer;
    color: #888; font-size: 18px; line-height: 1; padding: 0 2px;
  }
  #file-info .clear-btn:hover { color: #c00; }

  /* Project name */
  .field { margin-top: 18px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600;
    color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .field input {
    width: 100%; padding: 9px 12px; border: 1.5px solid #cdd5e0;
    border-radius: 7px; font-size: 14px; color: #222;
    transition: border-color 0.15s;
    outline: none;
  }
  .field input:focus { border-color: #2e6db4; }

  /* Convert button */
  #convert-btn {
    margin-top: 22px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #F4B942, #e8a020);
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; color: #1F3864;
    cursor: pointer; letter-spacing: 0.3px;
    transition: opacity 0.15s, transform 0.1s;
  }
  #convert-btn:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
  #convert-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* Status / progress */
  #status {
    display: none;
    margin-top: 18px;
    border-radius: 8px;
    padding: 13px 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  #status.info    { background: #eaf3ff; color: #1a3a6b; border: 1px solid #b3d0f5; }
  #status.success { background: #eafaf1; color: #155724; border: 1px solid #b2dfdb; }
  #status.error   { background: #fff0f0; color: #721c24; border: 1px solid #f5c6cb; }

  #status .dl-link {
    display: inline-block; margin-top: 10px;
    background: #1F3864; color: #fff;
    padding: 8px 18px; border-radius: 6px;
    text-decoration: none; font-weight: 600; font-size: 13px;
  }
  #status .dl-link:hover { background: #2e6db4; }

  /* History */
  #history { margin-top: 24px; }
  #history h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #999; margin-bottom: 10px;
  }
  .hist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 7px;
    background: #f7f9fc; border: 1px solid #e8ecf2;
    margin-bottom: 6px; font-size: 13px;
  }
  .hist-item .hi-name { flex: 1; font-weight: 500; color: #1F3864; word-break: break-all; }
  .hist-item .hi-time { font-size: 11px; color: #aaa; white-space: nowrap; }
  .hist-item a {
    background: #1F3864; color: #fff; padding: 4px 12px;
    border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: 600;
    white-space: nowrap;
  }
  .hist-item a:hover { background: #2e6db4; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #b3d0f5; border-top-color: #1F3864;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>📋 Togal Takeoff Converter</h1>
    <p>Drop your Togal export and get a fully formatted takeoff spreadsheet instantly.</p>
  </div>

  <div class="body">

    <!-- Drop zone -->
    <div id="drop-zone">
      <div class="icon">📂</div>
      <div class="label">Drag & drop your Togal .xlsx file here</div>
      <div class="sub">or click to browse</div>
      <input type="file" id="file-input" accept=".xlsx">
    </div>

    <div id="file-info">
      <span>📄</span>
      <span class="fname" id="fname-label"></span>
      <button class="clear-btn" id="clear-btn" title="Remove">✕</button>
    </div>

    <!-- Project name -->
    <div class="field">
      <label for="project-name">Project Name (used for output filename)</label>
      <input type="text" id="project-name" placeholder="e.g. Trinity Apartments – Building A">
    </div>

    <button id="convert-btn" disabled>Convert to Takeoff Spreadsheet</button>

    <div id="status"></div>

    <!-- History -->
    <div id="history" style="display:none">
      <h3>Recent Conversions</h3>
      <div id="history-list"></div>
    </div>

  </div>
</div>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const fileInfo   = document.getElementById('file-info');
  const fnameLabel = document.getElementById('fname-label');
  const clearBtn   = document.getElementById('clear-btn');
  const projectIn  = document.getElementById('project-name');
  const convertBtn = document.getElementById('convert-btn');
  const statusDiv  = document.getElementById('status');
  const historyDiv = document.getElementById('history');
  const histList   = document.getElementById('history-list');

  let selectedFile = null;
  let history = JSON.parse(localStorage.getItem('togal_history') || '[]');

  function renderHistory() {
    if (history.length === 0) { historyDiv.style.display = 'none'; return; }
    historyDiv.style.display = 'block';
    histList.innerHTML = history.slice(0, 6).map(h => `
      <div class="hist-item">
        <span>📊</span>
        <span class="hi-name">${h.name}</span>
        <span class="hi-time">${h.time}</span>
        <a href="/download/${encodeURIComponent(h.filename)}" download>⬇ Download</a>
      </div>`).join('');
  }
  renderHistory();

  function setFile(file) {
    if (!file || !file.name.endsWith('.xlsx')) {
      showStatus('error', 'Please select a valid .xlsx file.');
      return;
    }
    selectedFile = file;
    fnameLabel.textContent = file.name;
    fileInfo.style.display = 'flex';
    dropZone.querySelector('.label').textContent = 'File selected ✓';
    dropZone.style.borderColor = '#27ae60';
    dropZone.style.background  = '#f0faf4';
    // Auto-fill project name from filename if blank
    if (!projectIn.value.trim()) {
      projectIn.value = file.name.replace(/\.xlsx$/i, '').replace(/[-_]+/g, ' ');
    }
    convertBtn.disabled = false;
    statusDiv.style.display = 'none';
  }

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.style.display = 'none';
    dropZone.querySelector('.label').textContent = 'Drag & drop your Togal .xlsx file here';
    dropZone.style.borderColor = '';
    dropZone.style.background  = '';
    convertBtn.disabled = true;
    statusDiv.style.display = 'none';
  });

  fileInput.addEventListener('change', e => setFile(e.target.files[0]));

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', e => { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    setFile(e.dataTransfer.files[0]);
  });

  function showStatus(type, html) {
    statusDiv.className = `status ${type}`;
    statusDiv.innerHTML = html;
    statusDiv.style.display = 'block';
  }

  convertBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    const projectName = projectIn.value.trim() || selectedFile.name.replace(/\.xlsx$/i, '');

    convertBtn.disabled = true;
    showStatus('info', '<span class="spinner"></span> Converting… please wait');

    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('project_name', projectName);

    try {
      let res;
      try {
        res = await fetch('/convert', { method: 'POST', body: fd });
      } catch (netErr) {
        showStatus('error',
          `❌ <strong>Cannot reach the app server.</strong><br><br>
           Most likely causes:<br>
           &bull; You opened <code>index.html</code> directly instead of using <code>START.command</code><br>
           &bull; The Terminal window running the app was closed<br><br>
           <strong>Fix:</strong> Close this tab, double-click <strong>START.command</strong>, wait until
           Terminal says <em>"Server is ready!"</em>, then navigate to
           <strong>http://127.0.0.1:5000</strong> manually if the browser doesn't open automatically.`);
        convertBtn.disabled = false;
        return;
      }
      const data = await res.json();

      if (data.error) {
        showStatus('error', `❌ <strong>Error:</strong> ${data.error}`);
      } else {
        showStatus('success',
          `✅ <strong>Done!</strong> ${data.categories} categories, ${data.items} line items converted.<br>
           <a class="dl-link" href="/download/${encodeURIComponent(data.filename)}" download>
             ⬇ Download ${data.filename}
           </a>`);

        const now = new Date();
        history.unshift({
          name: projectName,
          filename: data.filename,
          time: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
        });
        history = history.slice(0, 10);
        localStorage.setItem('togal_history', JSON.stringify(history));
        renderHistory();
      }
    } catch (err) {
      showStatus('error', `❌ <strong>Connection error:</strong> ${err.message}`);
    }

    convertBtn.disabled = false;
  });
</script>
</body>
</html>
